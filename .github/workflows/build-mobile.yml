name: Build Mobile

env:
  ANDROID_SDK_VERSION: "36.1.0"

on:
  pull_request:
    branches: ["main"]
    paths:
      - "web/**"
      - "android/**"
      - ".github/workflows/build-mobile.yml"

permissions:
  contents: read

jobs:
  build:
    strategy:
      matrix:
        target: [android]
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v3
        with:
          java-version: "21"
          distribution: "temurin"

      - name: Install Android SDK Command Line Tools
        run: |
          export ANDROID_SDK_ROOT=$HOME/Android/Sdk
          mkdir -p $ANDROID_SDK_ROOT/cmdline-tools
          cd $ANDROID_SDK_ROOT/cmdline-tools
          wget https://dl.google.com/android/repository/commandlinetools-linux-13114758_latest.zip -O commandlinetools.zip
          unzip commandlinetools.zip
          rm commandlinetools.zip
          mv cmdline-tools latest
          echo "$ANDROID_SDK_ROOT/cmdline-tools/latest/bin" >> $GITHUB_PATH
          echo "$ANDROID_SDK_ROOT/platform-tools" >> $GITHUB_PATH

      - name: Install Android SDK build tools
        run: |
          export ANDROID_SDK_ROOT=$HOME/Android/Sdk
          yes | sdkmanager --licenses
          sdkmanager "build-tools;${{env.ANDROID_SDK_VERSION}}"
          echo "$ANDROID_SDK_ROOT/build-tools/${{env.ANDROID_SDK_VERSION}}" >> $GITHUB_PATH

      - name: Get Keystore
        run: |
          mkdir ~/.keystore 
          echo ${{ secrets.ANDROID_KEYSTORE }} | base64 --decode > ~/.keystore/pulse-editor.keystore

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install shared-utils dependencies
        run: npm install --workspace=npm-packages/shared-utils

      - name: Build shared-utils
        run: npm run shared-utils-build

      - name: Install web dependencies
        run: npm install --workspace=web

      - name: Build Web App
        run: npm run web-build

      - name: Install mobile dependencies
        run: npm install --workspace=mobile

      - name: Change Android Project Permission
        run: chmod +x mobile/android/gradlew

      - name: Sync Capacitor App
        run: npx cap sync
        working-directory: mobile

      - name: Build Capacitor App
        run: |
          export ANDROID_SDK_ROOT=$HOME/Android/Sdk
          unset ANDROID_HOME
          npx cap build android --keystorepath ~/.keystore/pulse-editor.keystore --keystorepass ${{ secrets.ANDROID_KEYSTORE_PASS }} --androidreleasetype APK
        working-directory: mobile
